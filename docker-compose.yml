services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: recrutify
      POSTGRES_PASSWORD: recrutify
      POSTGRES_DB: recrutify
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U recrutify"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build: ./backend
    environment:
      APP_ENV: production
      DATABASE_URL: postgresql+psycopg2://recrutify:recrutify@db:5432/recrutify
      SECRET_KEY: change-me-to-a-long-random-string
      CORS_ORIGINS: http://localhost,http://localhost:5173
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"

  frontend:
    build: ./frontend
    depends_on:
      - backend
    ports:
      - "5173:80"

volumes:
  pgdata:
